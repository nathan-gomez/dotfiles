set-option -sa terminal-overrides ",xterm*:Tc"

set -s escape-time 0
set -g mouse on

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on
set-option -g allow-rename off

# Vi copy mode
setw -g mode-keys vi

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel

# rename window to reflect current program
setw -g automatic-rename on

# Set new panes to open in current directory
bind c new-window -c "#{pane_current_path}"
bind-key h split-window -c "#{pane_current_path}"
bind-key v split-window -h -c "#{pane_current_path}"

# Use Alt + vim keys without prefix key to switch panes
bind -n M-h select-pane -L
bind -n M-l select-pane -R
bind -n M-k select-pane -U
bind -n M-j select-pane -D

# Shift arrow to switch windows
bind -n S-Left  previous-window
bind -n S-Right next-window

# Set Prefix
unbind C-b
unbind C-a
set -g prefix C-a
bind C-a send-prefix

# Source .conf
bind r source-file ~/.config/tmux/tmux.conf; display "Config reloaded"

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'jaclu/tmux-menus'
set -g @plugin 'tmux-plugins/tmux-resurrect'

set -g @resurrect-dir '~/.config/tmux/resurrect'

#####################
# Theme
#####################

set -g @fg "#c1c1c1"
set -g @fg_dim "#333333"

set -g @black "#111111"
set -g @green "#76946a"
set -g @red "#6e4c4c"
set -g @brown "#2a2325"
set -g @yellow "#cfaa7e"
set -g @teal "#6b8484"

# Glyphs
set -g @folder_icon "\ue5ff"
set -g @window_icon "\uf2d0"
set -g @zoom_icon "\uf002"
set -g @separator_left "\ue0bc"
set -g @separator_right "\ue0ba"

set -g status-style "bg=#{@black},fg=#{@fg}"
set -g status-interval 1
set -g status-left-length 100

# Pane border
set -g pane-border-style "fg=#{@fg_dim}"
set -g pane-active-border-style "fg=#{@fg}"

# Message text
set -g message-style "bg=#{@black},fg=#{@fg}"

# Left status bar
set -g status-left "#[fg=#{@black},bg=#{@fg}] #S \
#[fg=#{@black},bg=#{@fg}]#{@separator_right}"

# Right status bar
set -g status-right "#{@window_icon} #{pane_current_command} │ "
set -ga status-right "#{@folder_icon} #{b:pane_current_path} "
set -ga status-right "#{?window_zoomed_flag,│ #{@zoom_icon} ,}"

set -g window-status-format " #I#{?#{!=:#{window_name},Window},: #W,} "
set -g window-status-current-format "#[fg=#{@black},bg=default]#{@separator_left}\
 #[fg=default,bg=default]#I: #W \
#[fg=#{@black},bg=default]#{@separator_right}"

set -g window-status-style "bg=#{@black},fg=#{@fg}"
set -g window-status-current-style "bg=#{@black},fg=#{@yellow},bold"
set -g window-status-last-style "bg=#{@black},fg=#{@teal}"
set -g window-status-activity-style "bg=#{@yellow},fg=#{@fg}"
set -g window-status-bell-style "bg=#{@red},fg=#{@fg},bold"

#####################
# Theme
#####################

set -g @resurrect-strategy-nvim 'session'

# FZF
TMUX_FZF_LAUNCH_KEY="f"
TMUX_FZF_OPTIONS="-p -w 50% -h 50% -m"
TMUX_FZF_ORDER="window|session|pane|command"

#Install plugins with first run
if "test ! -d ~/.config/tmux/plugins/tpm" \ "run 'git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm && ~/.config/tmux/plugins/tpm/bin/install_plugins'"

# Install new plugins with prefix + I
run '~/.config/tmux/plugins/tpm/tpm'

